model:
  encoder_backbone: facebook/opt-125m
  latent_dim: 256
  predictor_layers: 2
  predictor_heads: 4
  predictor_mlp_ratio: 2
  ema_momentum_start: 0.996
  ema_momentum_end: 1.0
  temporal_stride: 1   # level-1 stride; change only via config, never hardcode
  max_seq_len: 128

data:
  context_window_k: 4
  pg19_segment: paragraph
  rocstories_segment: sentence

training:
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 0.01
  lr_schedule: cosine
  lr_final: 1.0e-5
  batch_size: 16
  max_epochs: 200
  early_stopping_patience: 30
  train_frac: 0.70
  val_frac: 0.10
  test_frac: 0.20
  token_dropout_rate: 0.15

loss:
  lambda_reg: 1.0
  bcs_num_slices: 1024
  bcs_lmbd: 0.1

seeds: [0, 1, 2, 3, 4]
